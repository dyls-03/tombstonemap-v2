name: Version Bump

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          ssh-key: ${{ secrets.VERSION_BUMP_DEPLOY_KEY }}

      - name: Use SSH remote
        run: |
          git remote set-url origin git@github.com:dyls-03/tombstonemap-v2.git

      - name: Configure Git
        run: |
          git config user.name "version-bump-action"
          git config user.email "version-bump-action@users.noreply.github.com"

      - name: Decide version bump
        id: bump
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'

          if echo "$LABELS" | grep -q "semver:major"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "semver:minor"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump package version
        run: |
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version

      - name: Commit and tag version
        run: |
          VERSION=$(node -p "require('./package.json').version")

          git add package.json
          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi

          git commit -m "chore(release): v$VERSION [skip ci]"
          git tag "v$VERSION"

          git push origin main
          git push origin "v$VERSION"